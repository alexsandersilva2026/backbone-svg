       <circle r="3" class="particle" style="opacity:0.6;"><animateMotion dur="2.6s" repeatCount="indefinite" path="M310,90 Q450,220 600,370"></animateMotion></circle>

       <circle r="4" class="particle"><animateMotion dur="3.4s" repeatCount="indefinite" path="M310,90 Q150,450 600,750"></animateMotion></circle>
       <circle r="3" class="particle" style="opacity:0.6;"><animateMotion dur="3.9s" repeatCount="indefinite" path="M600,750 Q150,450 310,90"></animateMotion></circle>

       <circle r="4" class="particle"><animateMotion dur="3.6s" repeatCount="indefinite" path="M310,90 Q650,400 1010,660"></animateMotion></circle>
       <circle r="3" class="particle" style="opacity:0.6;"><animateMotion dur="4.1s" repeatCount="indefinite" path="M1010,660 Q650,400 310,90"></animateMotion></circle>

       <circle r="4" class="particle"><animateMotion dur="2.3s" repeatCount="indefinite" path="M600,750 Q850,800 1010,660"></animateMotion></circle>
       <circle r="3" class="particle" style="opacity:0.6;"><animateMotion dur="2.7s" repeatCount="indefinite" path="M1010,660 Q850,800 600,750"></animateMotion></circle>
   </g>

