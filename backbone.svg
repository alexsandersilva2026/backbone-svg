<svg id="topology-svg" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" class="absolute inset-0 w-full h-full" style="z-index:0; background-color: #1a2332;">
   <defs>
    <filter id="glow">
     <feGaussianBlur stdDeviation="3" result="blur"></feGaussianBlur>
     <feMerge>
      <feMergeNode in="blur"></feMergeNode>
      <feMergeNode in="SourceGraphic"></feMergeNode>
     </feMerge>
    </filter>
    <style>
        .glow-line { stroke: #0f6; stroke-width: 2; filter: url(#glow); opacity: 0.6; }
        .particle { fill: #0f6; filter: url(#glow); }
        .node-text { fill: #ffffff; font-family: 'DM Sans', sans-serif; font-size: 12px; font-weight: bold; }
        .node-rect { fill: #101622; stroke: #0f6; stroke-width: 1.5; filter: url(#glow); rx: 4px; }
    </style>
   </defs> 

   <g id="lines">
       <path d="M160,700 Q80,450 240,260" fill="none" class="glow-line" id="p-sea01-sea04"></path>
       <path d="M160,700 Q650,950 1110,150" fill="none" class="glow-line" id="p-sea01-sea05"></path>
       <path d="M160,700 Q60,550 80,380" fill="none" class="glow-line" id="p-sea01-sea03"></path>
       <path d="M240,260 Q400,180 600,370" fill="none" class="glow-line" id="p-sea04-vta01"></path>
       <path d="M1110,150 Q700,-50 310,90" fill="none" class="glow-line" id="p-sea05-vta02"></path>
       <path d="M750,60 Q980,400 600,750" fill="none" class="glow-line" id="p-vva01-cca01"></path>
       <path d="M750,60 Q620,180 600,370" fill="none" class="glow-line" id="p-vva01-vta01"></path>
       <path d="M750,60 Q950,150 1020,400" fill="none" class="glow-line" id="p-vva01-vva03"></path>
       <path d="M1020,400 Q800,220 600,370" fill="none" class="glow-line" id="p-vva03-vta01"></path>
       <path d="M1020,400 Q900,680 600,750" fill="none" class="glow-line" id="p-vva03-cca01"></path>
       <path d="M1020,400 Q700,80 310,90" fill="none" class="glow-line" id="p-vva03-vta02"></path>
       <path d="M600,370 Q450,550 600,750" fill="none" class="glow-line" id="p-vta01-cca01"></path>
       <path d="M600,370 Q450,220 310,90" fill="none" class="glow-line" id="p-vta01-vta02"></path>
       <path d="M310,90 Q150,450 600,750" fill="none" class="glow-line" id="p-vta02-cca01"></path>
       <path d="M310,90 Q650,400 1010,660" fill="none" class="glow-line" id="p-vta02-sea02"></path>
       <path d="M600,750 Q850,800 1010,660" fill="none" class="glow-line" id="p-cca01-sea02"></path>
   </g> 

   <g id="particles">
