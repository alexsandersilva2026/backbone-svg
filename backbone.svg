<svg id="topology-svg" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" class="absolute inset-0 w-full h-full" style="z-index:0; background-color: #1a2332;">
   <defs>
    <filter id="glow">
     <feGaussianBlur stdDeviation="3" result="blur"></feGaussianBlur>
     <feMerge>
      <feMergeNode in="blur"></feMergeNode>
      <feMergeNode in="SourceGraphic"></feMergeNode>
     </feMerge>
    </filter>
    <style>
        .glow-line { stroke: #0f6; stroke-width: 2; filter: url(#glow); opacity: 0.6; }
        .particle { fill: #0f6; filter: url(#glow); }
        .node-text { fill: #ffffff; font-family: 'DM Sans', sans-serif; font-size: 12px; font-weight: bold; }
        .node-rect { fill: #101622; stroke: #0f6; stroke-width: 1.5; filter: url(#glow); rx: 4px; }
    </style>
   </defs> 

   <g id="lines">
       <path d="M120,680 Q80,400 180,120" fill="none" class="glow-line" id="p-sea01-sea04"></path>
       <path d="M120,680 Q600,950 1120,120" fill="none" class="glow-line" id="p-sea01-sea05"></path>
       <path d="M120,680 Q60,500 80,240" fill="none" class="glow-line" id="p-sea01-sea03"></path>
       <path d="M180,120 Q300,300 500,500" fill="none" class="glow-line" id="p-sea04-vta01"></path>
       <path d="M1120,120 Q800,-20 440,220" fill="none" class="glow-line" id="p-sea05-vta02"></path>
       <path d="M780,60 Q900,450 600,770" fill="none" class="glow-line" id="p-vva01-cca01"></path>
       <path d="M780,60 Q700,250 500,500" fill="none" class="glow-line" id="p-vva01-vta01"></path>
       <path d="M780,60 Q950,150 1120,420" fill="none" class="glow-line" id="p-vva01-vva03"></path>
       <path d="M1120,420 Q800,250 500,500" fill="none" class="glow-line" id="p-vva03-vta01"></path>
       <path d="M1120,420 Q1000,700 600,770" fill="none" class="glow-line" id="p-vva03-cca01"></path>
       <path d="M1120,420 Q800,450 440,220" fill="none" class="glow-line" id="p-vva03-vta02"></path>
       <path d="M500,500 Q450,650 600,770" fill="none" class="glow-line" id="p-vta01-cca01"></path>
       <path d="M500,500 Q350,350 440,220" fill="none" class="glow-line" id="p-vta01-vta02"></path>
       <path d="M440,220 Q250,550 600,770" fill="none" class="glow-line" id="p-vta02-cca01"></path>
       <path d="M440,220 Q700,300 1110,720" fill="none" class="glow-line" id="p-vta02-sea02"></path>
       <path d="M600,770 Q850,850 1110,720" fill="none" class="glow-line" id="p-cca01-sea02"></path>
   </g> 

   <g id="particles">
       <circle r="4" class="particle"><animateMotion dur="2.4s" repeatCount="indefinite" path="M120,680 Q80,400 180,120"></animateMotion></circle>
       <circle r="3" class="particle" style="opacity:0.6;"><animateMotion dur="3.1s" repeatCount="indefinite" path="M180,120 Q80,400 120,680"></animateMotion></circle>
       
       <circle r="4" class="particle"><animateMotion dur="4.2s" repeatCount="indefinite" path="M120,680 Q600,950 1120,120"></animateMotion></circle>
       <circle r="3" class="particle" style="opacity:0.6;"><animateMotion dur="4.8s" repeatCount="indefinite" path="M1120,120 Q600,950 120,680"></animateMotion></circle>

       <circle r="4" class="particle"><animateMotion dur="2.1s" repeatCount="indefinite" path="M120,680 Q60,500 80,240"></animateMotion></circle>
       <circle r="3" class="particle" style="opacity:0.6;"><animateMotion dur="2.6s" repeatCount="indefinite" path="M80,240 Q60,500 120,680"></animateMotion></circle>

       <circle r="4" class="particle"><animateMotion dur="2.3s" repeatCount="indefinite" path="M180,120 Q300,300 500,500"></animateMotion></circle>
       <circle r="3" class="particle" style="opacity:0.6;"><animateMotion dur="2.8s" repeatCount="indefinite" path="M500,500 Q300,300 180,120"></animateMotion></circle>

       <circle r="4" class="particle"><animateMotion dur="3.5s" repeatCount="indefinite" path="M1120,120 Q800,-20 440,220"></animateMotion></circle>
       <circle r="3" class="particle" style="opacity:0.6;"><animateMotion dur="4.2s" repeatCount="indefinite" path="M440,220 Q800,-20 1120,120"></animateMotion></circle>

       <circle r="4" class="particle"><animateMotion dur="3.2s" repeatCount="indefinite" path="M780,60 Q900,450 600,770"></animateMotion></circle>
       <circle r="3" class="particle" style="opacity:0.6;"><animateMotion dur="3.7s" repeatCount="indefinite" path="M600,770 Q900,450 780,60"></animateMotion></circle>

       <circle r="4" class="particle"><animateMotion dur="2.7s" repeatCount="indefinite" path="M780,60 Q700,250 500,500"></animateMotion></circle>
       <circle r="3" class="particle" style="opacity:0.6;"><animateMotion dur="3.3s" repeatCount="indefinite" path="M500,500 Q700,250 780,60"></animateMotion></circle>

       <circle r="4" class="particle"><animateMotion dur="2.2s" repeatCount="indefinite" path="M780,60 Q950,150 1120,420"></animateMotion></circle>
       <circle r="3" class="particle" style="opacity:0.6;"><animateMotion dur="2.9s" repeatCount="indefinite" path="M1120,420 Q950,150 780,60"></animateMotion></circle>

       <circle r="4" class="particle"><animateMotion dur="2.5s" repeatCount="indefinite" path="M1120,420 Q800,250 500,500"></animateMotion></circle>
       <circle r="3" class="particle" style="opacity:0.6;"><animateMotion dur="3.1s" repeatCount="indefinite" path="M500,500 Q800,250 1120,420"></animateMotion></circle>

       <circle r="4" class="particle"><animateMotion dur="2.9s" repeatCount="indefinite" path="M1120,420 Q1000,700 600,770"></animateMotion></circle>
       <circle r="3" class="particle" style="opacity:0.6;"><animateMotion dur="3.4s" repeatCount="indefinite" path="M600,770 Q1000,700 1120,420"></animateMotion></circle>

       <circle r="4" class="particle"><animateMotion dur="3.1s" repeatCount="indefinite" path="M1120,420 Q800,450 440,220"></animateMotion></circle>
       <circle r="3" class="particle" style="opacity:0.6;"><animateMotion dur="3.8s" repeatCount="indefinite" path="M440,220 Q800,450 1120,420"></animateMotion></circle>

       <circle r="4" class="particle"><animateMotion dur="2.4s" repeatCount="indefinite" path="M500,500 Q450,650 600,770"></animateMotion></circle>
       <circle r="3" class="particle" style="opacity:0.6;"><animateMotion dur="2.8s" repeatCount="indefinite" path="M600,770 Q450,650 500,500"></animateMotion></circle>

       <circle r="4" class="particle"><animateMotion dur="2.2s" repeatCount="indefinite" path="M500,500 Q350,350 440,220"></animateMotion></circle>
       <circle r="3" class="particle" style="opacity:0.6;"><animateMotion dur="2.6s" repeatCount="indefinite" path="M440,220 Q350,350 500,500"></animateMotion></circle>

       <circle r="4" class="particle"><animateMotion dur="3.2s" repeatCount="indefinite" path="M440,220 Q250,550 600,770"></animateMotion></circle>
       <circle r="3" class="particle" style="opacity:0.6;"><animateMotion dur="3.7s" repeatCount="indefinite" path="M600,770 Q250,550 440,220"></animateMotion></circle>

       <circle r="4" class="particle"><animateMotion dur="3.5s" repeatCount="indefinite" path="M440,220 Q700,300 1110,720"></animateMotion></circle>
       <circle r="3" class="particle" style="opacity:0.6;"><animateMotion dur="4.1s" repeatCount="indefinite" path="M1110,720 Q700,300 440,220"></animateMotion></circle>

       <circle r="4" class="particle"><animateMotion dur="2.3s" repeatCount="indefinite" path="M600,770 Q850,850 1110,720"></animateMotion></circle>
       <circle r="3" class="particle" style="opacity:0.6;"><animateMotion dur="2.7s" repeatCount="indefinite" path="M1110,720 Q850,850 600,770"></animateMotion></circle>
   </g>

   <g id="nodes">
       <rect x="15" y="220" width="120" height="40" class="node-rect" />
       <text x="80" y="244" text-anchor="middle" class="node-text">SEA03</text>

       <rect x="60" y="660" width="120" height="40" class="node-rect" />
       <text x="120" y="684" text-anchor="middle" class="node-text">SEA01</text>

       <rect x="120" y="100" width="120" height="40" class="node-rect" />
       <text x="180" y="124" text-anchor="middle" class="node-text">SEA04</text>

       <rect x="380" y="200" width="120" height="40" class="node-rect" />
       <text x="440" y="224" text-anchor="middle" class="node-text">VTA02</text>

       <rect x="440" y="480" width="120" height="40" class="node-rect" />
       <text x="500" y="504" text-anchor="middle" class="node-text">VTA01</text>

       <rect x="720" y="40" width="120" height="40" class="node-rect" />
       <text x="780" y="64" text-anchor="middle" class="node-text">VVA01</text>

       <rect x="1060" y="400" width="120" height="40" class="node-rect" />
       <text x="1120" y="424" text-anchor="middle" class="node-text">VVA03</text>

       <rect x="1060" y="100" width="120" height="40" class="node-rect" />
       <text x="1120" y="124" text-anchor="middle" class="node-text">SEA05</text>

       <rect x="1050" y="700" width="120" height="40" class="node-rect" />
       <text x="1110" y="724" text-anchor="middle" class="node-text">SEA02</text>

