       <circle r="3" class="particle" style="opacity:0.6;"><animateMotion dur="3.4s" repeatCount="indefinite" path="M600,370 Q800,220 1020,400"></animateMotion></circle>

       <circle r="4" class="particle"><animateMotion dur="3.0s" repeatCount="indefinite" path="M1020,400 Q900,680 600,750"></animateMotion></circle>
       <circle r="3" class="particle" style="opacity:0.6;"><animateMotion dur="3.5s" repeatCount="indefinite" path="M600,750 Q900,680 1020,400"></animateMotion></circle>

       <circle r="4" class="particle"><animateMotion dur="3.2s" repeatCount="indefinite" path="M1020,400 Q700,80 310,90"></animateMotion></circle>
       <circle r="3" class="particle" style="opacity:0.6;"><animateMotion dur="3.8s" repeatCount="indefinite" path="M310,90 Q700,80 1020,400"></animateMotion></circle>

       <circle r="4" class="particle"><animateMotion dur="2.4s" repeatCount="indefinite" path="M600,370 Q450,550 600,750"></animateMotion></circle>
       <circle r="3" class="particle" style="opacity:0.6;"><animateMotion dur="2.8s" repeatCount="indefinite" path="M600,750 Q450,550 600,370"></animateMotion></circle>

