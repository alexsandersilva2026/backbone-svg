<svg id="topology-svg" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" class="absolute inset-0 w-full h-full" style="z-index:0; background-color: #1a2332;">
   <defs>
    <filter id="glow">
     <feGaussianBlur stdDeviation="3" result="blur"></feGaussianBlur>
     <feMerge>
      <feMergeNode in="blur"></feMergeNode>
      <feMergeNode in="SourceGraphic"></feMergeNode>
     </feMerge>
    </filter>
    <style>
        .glow-line { stroke: #0f6; stroke-width: 2; filter: url(#glow); opacity: 0.6; }
        .particle { fill: #0f6; filter: url(#glow); }
        .node-text { fill: #ffffff; font-family: 'DM Sans', sans-serif; font-size: 12px; font-weight: bold; }
        .node-rect { fill: #101622; stroke: #0f6; stroke-width: 1.5; filter: url(#glow); rx: 4px; }
    </style>
   </defs> 

   <g id="lines">
       <path d="M300,650 Q280,500 350,400" fill="none" class="glow-line" id="p-sea01-sea04"></path>
       <path d="M300,650 Q700,780 1050,200" fill="none" class="glow-line" id="p-sea01-sea05"></path>
       <path d="M300,650 Q180,550 150,400" fill="none" class="glow-line" id="p-sea01-sea03"></path>
       <path d="M350,400 Q480,320 600,350" fill="none" class="glow-line" id="p-sea04-vta01"></path>
       <path d="M1050,200 Q750,50 400,150" fill="none" class="glow-line" id="p-sea05-vta02"></path>
       <path d="M750,120 Q880,450 600,700" fill="none" class="glow-line" id="p-vva01-cca01"></path>
       <path d="M750,120 Q700,200 600,350" fill="none" class="glow-line" id="p-vva01-vta01"></path>
       <path d="M750,120 Q850,200 900,350" fill="none" class="glow-line" id="p-vva01-vva03"></path>
       <path d="M900,350 Q750,300 600,350" fill="none" class="glow-line" id="p-vva03-vta01"></path>
       <path d="M900,350 Q850,550 600,700" fill="none" class="glow-line" id="p-vva03-cca01"></path>
       <path d="M900,350 Q650,150 400,150" fill="none" class="glow-line" id="p-vva03-vta02"></path>
       <path d="M600,350 Q480,520 600,700" fill="none" class="glow-line" id="p-vta01-cca01"></path>
       <path d="M600,350 Q550,200 400,150" fill="none" class="glow-line" id="p-vta01-vta02"></path>
       <path d="M400,150 Q250,450 600,700" fill="none" class="glow-line" id="p-vta02-cca01"></path>
       <path d="M400,150 Q750,320 950,600" fill="none" class="glow-line" id="p-vta02-sea02"></path>
       <path d="M600,700 Q750,750 950,600" fill="none" class="glow-line" id="p-cca01-sea02"></path>
   </g> 

