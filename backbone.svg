       <circle r="3" class="particle" style="opacity:0.6;"><animateMotion dur="3.1s" repeatCount="indefinite" path="M600,350 Q750,300 900,350"></animateMotion></circle>

       <circle r="4" class="particle"><animateMotion dur="2.9s" repeatCount="indefinite" path="M900,350 Q850,550 600,700"></animateMotion></circle>
       <circle r="3" class="particle" style="opacity:0.6;"><animateMotion dur="3.4s" repeatCount="indefinite" path="M600,700 Q850,550 900,350"></animateMotion></circle>

